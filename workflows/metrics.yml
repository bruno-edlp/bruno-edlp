# ══════════════════════════════════════════════════════════════════
#  GitHub Metrics — Bruno Eduardo (@bruno-edlp)
#  Gera SVGs automaticamente e salva no repositório de perfil
#
#  SETUP (fazer uma vez):
#  1. Acesse: https://github.com/settings/tokens
#  2. Gere um token com escopo: repo, read:user, read:org
#  3. No seu repo de perfil (bruno-edlp/bruno-edlp):
#     Settings → Secrets → Actions → New: METRICS_TOKEN
# ══════════════════════════════════════════════════════════════════

name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # roda todo dia à meia-noite UTC
  workflow_dispatch:       # permite rodar manualmente
  push:
    branches: ["main"]

jobs:

  # ── 1. Calendário isométrico de contribuições ──────────────────
  isocalendar:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

  # ── 2. Ícones de tecnologias (starred topics) ──────────────────
  topics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.topics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0

  # ── 3. Followers ───────────────────────────────────────────────
  people-followers:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.people.followers.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_people: yes
          plugin_people_types: followers
          plugin_people_limit: 28
          plugin_people_size: 28
          plugin_people_identicons_hide: yes

  # ── 4. Following ───────────────────────────────────────────────
  people-following:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.people.following.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_people: yes
          plugin_people_types: following
          plugin_people_limit: 28
          plugin_people_size: 28
          plugin_people_identicons_hide: yes